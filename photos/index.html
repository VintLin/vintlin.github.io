  const storageKey = "vint-color-scheme";
  const root = document.documentElement;
  const themeTransitionTimings = {
    light: {
      duration: 720,
      easing: "cubic-bezier(0.16, 1, 0.3, 1)"
    },
    dark: {
      duration: 620,
      easing: "cubic-bezier(0.7, 0, 0.22, 1)"
    }
  };

  const normalizePathname = (pathname) => {
    if (!pathname || pathname === "/") {
      return "/";
    }

    return pathname.endsWith("/") ? pathname.slice(0, -1) : pathname;
  };

  const bindHeaderLinkGuards = () => {
    const headerLinks = document.querySelectorAll("[data-header-nav-check]");

    headerLinks.forEach((link) => {
      if (link.dataset.headerNavBound === "true") {
        return;
      }

      link.dataset.headerNavBound = "true";
      link.addEventListener("click", (event) => {
        if (
          event.defaultPrevented ||
          event.button !== 0 ||
          event.metaKey ||
          event.ctrlKey ||
          event.shiftKey ||
          event.altKey
        ) {
          return;
        }

        const href = link.getAttribute("href");

        if (!href) {
          return;
        }

        const targetUrl = new URL(href, window.location.href);
        const currentPath = normalizePathname(window.location.pathname);
        const targetPath = normalizePathname(targetUrl.pathname);

        if (targetUrl.origin === window.location.origin && currentPath === targetPath) {
          event.preventDefault();
        }
      });
    });
  };

  const syncHeaderActiveState = () => {
    const currentPath = normalizePathname(window.location.pathname);
    const homeLink = document.querySelector("[data-header-home-link]");
    const navLinks = document.querySelectorAll("[data-header-nav-link]");

    if (homeLink) {
      if (currentPath === "/") {
        homeLink.setAttribute("aria-current", "page");
      } else {
        homeLink.removeAttribute("aria-current");
      }
    }

    navLinks.forEach((link) => {
      const rawMatches = link.getAttribute("data-nav-match");
      const matches = rawMatches ? JSON.parse(rawMatches) : [];
      const isActive = matches.some((href) => {
        const normalizedHref = normalizePathname(href);
        return normalizedHref === "/"
          ? currentPath === normalizedHref
          : currentPath.startsWith(normalizedHref);
      });

      link.classList.toggle("is-active", isActive);
      if (isActive) {
        link.setAttribute("aria-current", "page");
      } else {
        link.removeAttribute("aria-current");
      }
    });
  };

  const bindThemeButtons = () => {
    const buttons = document.querySelectorAll("[data-theme-toggle]");

    buttons.forEach((button) => {
      if (button.dataset.themeBound === "true") {
        return;
      }

      button.dataset.themeBound = "true";
      button.addEventListener("click", () => {
        const next = root.classList.contains("dark") ? "light" : "dark";
        localStorage.setItem(storageKey, next);
        animateThemeTransition(button, next);
      });
    });
  };

  const initializeHeader = () => {
    bindHeaderLinkGuards();
    bindThemeButtons();
    syncHeaderActiveState();
  };

  const applyTheme = (mode) => {
    const prefersDark =
      window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    const isDark = mode === "dark" || (mode === "auto" && prefersDark);

    root.classList.toggle("dark", isDark);
    root.dataset.themeMode = mode;
    document
      .querySelector('meta[name="theme-color"]')
      ?.setAttribute("content", isDark ? "#050505" : "#fafaf9");
    document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
      button.setAttribute("data-theme-state", isDark ? "dark" : "light");
      button.setAttribute("aria-label", isDark ? "Switch to light theme" : "Switch to dark theme");
    });
  };

  const resolveThemeTransitionOrigin = (button) => {
    const rect = button.getBoundingClientRect();
    return {
      x: rect.left + rect.width / 2,
      y: rect.top + rect.height / 2
    };
  };

  const resolveThemeTransitionRadius = ({ x, y }) =>
    Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y));

  const animateThemeTransition = (button, nextMode) => {
    const supportsViewTransition =
      typeof document.startViewTransition === "function" &&
      !window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (!supportsViewTransition || !(button instanceof HTMLElement)) {

    const isExpanding = nextMode === "light";
    const timing = themeTransitionTimings[nextMode];

    button.disabled = true;

    const transition = document.startViewTransition(() => {
      applyTheme(nextMode);

    transition.ready
      .then(() =>

              : "::view-transition-old(root)"

      )
      .catch(() => {})
      .finally(() => {
        button.disabled = false;
      });
  };

  initializeHeader();

  document.addEventListener("astro:page-load", initializeHeader);

  const stored = localStorage.getItem(storageKey) || "dark";
